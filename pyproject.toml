[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-agents"
version = "0.1.0"
description = "AI Agents package"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "langchain",
    "langgraph",
]

[project.scripts]
run-agent = "ai_agents.main:main"

[tool.setuptools.packages.find]
where = ["src"]
